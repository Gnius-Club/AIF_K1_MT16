<h2><span class="book-icon">📝</span> De un Vistazo: Misión: ¡Manos a la Obra, Fábrica de Ideas!</h2>
<p class="overview-subtitle">Resumen rápido de objetivos, materiales y preparación para esta aventura de aprendizaje.</p>
<div class="overview-table-container">
<table>
<thead>
<tr>

</tr>
</thead>
<tbody>
<tr>
<td>
<strong>Objetivos de Aprendizaje:</strong>
<ul>
<li>Integrar conceptos aprendidos: máquinas y su propósito.</li>
<li>Crear una idea para una "máquina ayudante".</li>
<li>Dibujar un plan simple de la máquina.</li>
</ul>
<strong>Secuencia Didáctica de la Misión:</strong>
<ul>
<li>⚡ Actividad 1: ¡Bienvenidos al Laboratorio de Ideas!</li>
<li>⚡ Actividad 2: Misión en Equipo: ¡A Resolver Problemas!</li>
<li>⚡ Actividad 3: ¡Manos a la Obra! Diseñando Nuestro Ayudante Robótico</li>
<li>⚡ Actividad 4: ¡Misión Cumplida! Compartiendo Nuestros Inventos</li>
</ul>
<strong>Entregable Clave:</strong>
<ul>
<li>Elaboración de un dibujo grupal de una máquina ayudante con un problema y solución identificados, mostrando participación activa.</li>
</ul>
</td>
<td>
<strong>Materiales Específicos:</strong>
<ul>
<li>Papel grande</li>
<li>Marcadores</li>
<li>Hojas de papel individuales</li>
<li>Crayones</li>
</ul>
<strong>Preparación Previa para ESTA Sesión:</strong>
<ol>
<li><strong>Revisión de Materiales:</strong> Asegurar que todos los materiales estén completos, limpios y listos para ser repartidos.</li>
<li><strong>Preparación del Espacio:</strong> Organizar el aula para facilitar la actividad (círculo en el suelo, mesas de trabajo, espacio para moverse). Considerar el espacio para proyectar las diapositivas.</li>
<li><strong>Familiarización:</strong> Leer el playbook completo para entender el flujo narrativo, los diálogos y las transiciones. Tener clara la historia o el reto que se presentará.</li>
<li><strong>Diapositivas:</strong> Tener preparadas las 8 diapositivas mencionadas en la secuencia para proyectar en el momento adecuado.</li>
</ol>

<div class="activity-card" id="activity-1">
<h2>⚡ Actividad 1: ¡Bienvenidos al Laboratorio de Ideas! ⏰ 10 min</h2>
<p>Es hora de despertar a nuestros inventores internos y preparar el terreno para una aventura de creatividad y soluciones.</p>
<div class="steps">
<div class="step-card">
<div class="step-content">
<h3>Paso 1: El Ritual del Inventor y la Diapositiva Mágica ⏰ 5 min</h3>
<p>Reúne a los niños en un círculo o en sus lugares habituales. Colócate el "sombrero de inventor" de forma teatral para establecer un tono de misterio y aventura. Explica que hoy se transformarán en inventores. (Proyectar Diapositiva 1: "¡Somos Inventores!").</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡Hola, hola, mis pequeños y brillantes inventores! ¡Bienvenidos a nuestro increíble laboratorio de ideas! Hoy nos ponemos nuestro 'sombrero de inventor' (ponte el sombrero) porque tenemos una misión súper especial. Miren la pantalla (señala la proyección de Diapositiva 1): ¡Hoy somos inventores! ¿Saben qué hace un inventor? ¡Un inventor es alguien que piensa, crea y construye cosas nuevas para ayudar! Y eso es justo lo que haremos hoy: ¡vamos a diseñar máquinas ayudantes que harán del mundo un lugar más fácil y divertido! ¡Prepárense para usar su imaginación al máximo!</p>
</div>
</div>
</div>
<div class="step-card">
<div class="step-content">
<h3>Paso 2: El Gran Acertijo: ¿Qué Problema Resolveremos? ⏰ 5 min</h3>
<p>Inicia una lluvia de ideas sobre problemas cotidianos simples que una máquina podría resolver para la clase, en casa o en el patio. (Proyectar Diapositiva 2: "¡Problemas que Necesitan Ayuda!"). Anota las ideas clave en un papel grande o pizarra, asegurándote de que todos los niños tengan la oportunidad de participar.</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">Muy bien, inventores. Antes de crear nuestras máquinas, necesitamos saber... ¿qué problema queremos resolver? Miren la pantalla (señala la proyección de Diapositiva 2). Piensen: ¿Hay algo que sea difícil de hacer? ¿Algo que siempre esté desordenado? Por ejemplo, ¿los juguetes siempre están tirados? ¿Las plantas tienen sed y se les olvida regarlas? ¿Hay calcetines perdidos? ¡Cuéntenme, cuéntenme! ¡Todas las ideas son bienvenidas en este laboratorio de problemas y soluciones!</p>
</div>
</div>
</div>
</div>
</div>
<div class="activity-card" id="activity-2">
<h2>⚡ Actividad 2: Misión en Equipo: ¡A Resolver Problemas! ⏰ 10 min</h2>
<p>Juntos, como un gran equipo de ingenieros, vamos a identificar los retos que nuestras máquinas ayudarán a superar. ¡La colaboración es clave!</p>
<div class="steps">
<div class="step-card">
<div class="step-content">
<h3>Paso 1: Formando Equipos de Genios y Eligiendo Nuestro Reto ⏰ 5 min</h3>
<p>Divide a los niños en equipos pequeños de 3-4 integrantes. Explica que trabajarán juntos como un "escuadrón de inventores". (Proyectar Diapositiva 3: "¡Equipos de Inventores!"). Cada equipo deberá elegir UN problema de la lista que crearon en la actividad anterior. Recuérdales que solo pueden elegir uno para enfocar su invención.</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡Excelente, equipo! Ya tenemos un montón de ideas geniales. Ahora, como verdaderos científicos e ingenieros, vamos a trabajar en equipo. Miren la pantalla (señala la proyección de Diapositiva 3). Voy a dividirnos en pequeños "escuadrones de inventores". Cada escuadrón va a tener una misión: de todos los problemas que anotamos, van a elegir UN SOLO problema, ¡solo uno!, que su máquina resolverá. Es importante que todos en el equipo estén de acuerdo. ¡Pongan sus cabecitas a pensar juntos, porque la unión hace la fuerza en este laboratorio!</p>
</div>
</div>
</div>
<div class="step-card">
<div class="step-content">
<h3>Paso 2: Nuestro Problema Elegido: ¡A Consensuar! ⏰ 5 min</h3>
<p>Circula entre los equipos, asegurándote de que cada uno dialogue y llegue a un consenso sobre el problema que abordarán. Anima a que todos participen en la decisión. (Proyectar Diapositiva 4: "Nuestro Problema a Resolver"). Puedes preguntarles: "¿Por qué eligieron ese problema?" o "¿Cómo creen que una máquina podría ayudar con eso?".</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡Muy bien, escuadrones! Es hora de que cada equipo decida cuál será su 'Misión'. Miren la pantalla (señala la proyección de Diapositiva 4). Discutan entre ustedes: ¿cuál de esos problemas es el que más les gustaría que su máquina resolviera? Recuerden, es importante que todos en el equipo estén felices con la elección. ¡Quiero escuchar sus ideas! ¿Ya se pusieron de acuerdo? ¡Excelente! ¡Ese es un gran problema para que su máquina ayudante lo resuelva!</p>
</div>
</div>
</div>
</div>
</div>
<div class="activity-card" id="activity-3">
<h2>⚡ Actividad 3: ¡Manos a la Obra! Diseñando Nuestro Ayudante Robótico ⏰ 15 min</h2>
<p>Aquí es donde la magia sucede. ¡Vamos a darle vida a nuestras ideas creativas y plasmar el diseño de nuestra máquina ayudante en papel!</p>
<div class="steps">
<div class="step-card">
<div class="step-content">
<h3>Paso 1: Preparando el Área de Diseño y Diapositiva de Inspiración ⏰ 2 min</h3>
<p>Entrega a cada equipo un papel grande, marcadores y crayones. Asegúrate de que cada equipo tenga suficiente espacio para trabajar cómodamente (puede ser en el suelo o en mesas unidas) y que los materiales estén al alcance de todos. (Proyectar Diapositiva 5: "¡Nuestras Herramientas de Diseño!").</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡A sus marcas, listos, inventores! ¡Es momento de preparar nuestras estaciones de diseño! Miren la pantalla (señala la proyección de Diapositiva 5): ¡Aquí están nuestras herramientas mágicas! Cada equipo tendrá su propio lienzo gigante (el papel grande), sus marcadores de colores y sus crayones. ¡Vamos, que el tiempo vuela cuando estamos inventando cosas asombrosas! Asegúrense de que todos puedan alcanzar los materiales fácilmente.</p>
</div>
</div>
</div>
<div class="step-card">
<div class="step-content">
<h3>Paso 2: Creando el Plan Maestro de Nuestro Ayudante Robótico ⏰ 13 min</h3>
<p>Indica a los equipos que ahora deben dibujar su "Robot Ayudante" en el papel grande. Deben pensar en cómo se ve su máquina y qué partes tiene para resolver el problema elegido. (Proyectar Diapositiva 6: "¡Diseña tu Robot Ayudante!"). Circula entre los equipos, ofreciendo ayuda y haciendo preguntas para estimular la creatividad y la colaboración. Anímales a añadir detalles divertidos y funcionales.</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡Manos a la obra, superinventores! ¡Es momento de que sus ideas cobren vida en el papel! Miren la pantalla (señala la proyección de Diapositiva 6). Dibujen su 'Robot Ayudante'. ¿Cómo se ve? ¿Qué hace para ayudar? ¡Dejen volar su imaginación! Si su robot tiene brazos largos para guardar juguetes, ¡dibújenlos! ¿Y si tiene una regadera para las plantas o un recolector de calcetines perdidos? ¡Píntenlo! ¿Tiene ruedas para moverse? ¿Una luz que se enciende cuando está trabajando? ¡Piensen en todos los detalles! Estoy seguro de que saldrán invenciones maravillosas. ¡Qué gran idea! ¡Me encanta cómo están pensando juntos y ayudándose unos a otros!</p>
</div>
</div>
</div>
</div>
</div>
<div class="activity-card" id="activity-4">
<h2>⚡ Actividad 4: ¡Misión Cumplida! Compartiendo Nuestros Inventos ⏰ 5 min</h2>
<p>Es momento de celebrar y mostrar al mundo las increíbles máquinas ayudantes que hemos creado. ¡Orgullo de inventores!</p>
<div class="steps">
<div class="step-card">
<div class="step-content">
<h3>Paso 1: La Gran Presentación de Nuestros Inventos ⏰ 3 min</h3>
<p>Pide a cada equipo que presente su dibujo al resto de la clase. Deben compartir el nombre que le pusieron a su "Robot Ayudante" y explicar brevemente qué problema resuelve y cómo lo hace. (Proyectar Diapositiva 7: "¡Muestra tu Invento al Mundo!"). Anima a los otros equipos a escuchar con atención y a aplaudir a sus compañeros.</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡Wow, wow, wow! ¡Qué robots ayudantes tan increíbles han creado! ¡Mi sombrero de inventor está a punto de explotar de la emoción! Miren la pantalla (señala la proyección de Diapositiva 7). Es hora de que cada equipo nos presente a su fabuloso invento. ¿Cuál es el nombre de su robot? ¡Queremos conocerlo! ¿Y qué problema gigante ayuda a resolver? ¿Cómo lo hace? ¡Vengan, valientes inventores, compartan su genialidad con todos nosotros! ¡No puedo esperar a ver todas esas ideas geniales!</p>
</div>
</div>
</div>
<div class="step-card">
<div class="step-content">
<h3>Paso 2: Celebración y Aplausos para los Genios Creadores ⏰ 2 min</h3>
<p>Dirige una ronda de aplausos y felicitaciones para todos los "inventores". Recalca lo bien que trabajaron en equipo, cómo compartieron sus ideas y lo creativas que fueron sus invenciones. (Proyectar Diapositiva 8: "¡Inventores Asombrosos! ¡Misión Cumplida!"). Anímales a seguir imaginando y creando, recordándoles que todos tienen un inventor dentro de sí.</p>
</div>
<div class="collapsible">
<button type="button" class="collapsible-button">Diálogo Sugerido</button>
<div class="collapsible-content">
<p class="dialogue assistant">¡MISIÓN CUMPLIDA, SÚPER EQUIPO! ¡Hoy hemos demostrado que somos unos genios de la invención! ¡Un aplauso enorme para todos ustedes por su creatividad, su ingenio y por trabajar tan bonito en equipo! (Lidera los aplausos). Miren la pantalla (señala la proyección de Diapositiva 8). ¡Son inventores asombrosos! ¿Qué fue lo más divertido de crear su robot? ¡Estoy muy orgulloso de cada uno de ustedes! Recuerden que siempre podemos usar nuestra imaginación para crear cosas nuevas y ayudar a los demás. ¡Hasta la próxima aventura, pequeños inventores!</p>
</div>
</div>
